<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro y Login | ADSO 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/scripts.js"></script>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="auth-grid">
            <div class="auth-tabs">
                <button type="button" class="tab-btn active" data-target="registro">Registrarse</button>
                <button type="button" class="tab-btn" data-target="login">Iniciar sesión</button>
            </div>

            <div class="auth-forms">
                <form id="formRegistro" class="auth-form" novalidate>
                    <h3>Crear cuenta</h3>

                    <div class="datos-entrada">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre completo">
                    </div>

                    <div class="datos-entrada">
                        <label for="emailRegistro">Correo electrónico</label>
                        <input type="email" id="emailRegistro" name="email" required placeholder="usuario@correo.com">
                    </div>

                    <div class="datos-entrada">
                        <label for="passwordRegistro">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="passwordRegistro" name="password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" placeholder="Mínimo 8 caracteres">
                            <button type="button" class="btn-toggle-password" data-target="passwordRegistro" aria-label="Mostrar u ocultar contraseña">👁️</button>
                        </div>
                        <small class="hint">Debe incluir mayúscula, minúscula, número y al menos 8 caracteres.</small>
                    </div>

                    <div class="datos-entrada">
                        <label for="confirmPassword">Repetir contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite la contraseña">
                            <button type="button" class="btn-toggle-password" data-target="confirmPassword" aria-label="Mostrar u ocultar contraseña">👁️</button>
                        </div>
                    </div>

                    <div class="nivel-seguridad" aria-live="polite">
                        <span class="nivel-text">Nivel de seguridad: <strong id="passwordStrength">-</strong></span>
                    </div>

                    <button type="submit" class="btn boton-enviar">Registrarme</button>
                    <p class="form-message" aria-live="polite"></p>
                </form>

                <form id="formLogin" class="auth-form hidden" novalidate>
                    <h3>Iniciar sesión</h3>

                    <div class="datos-entrada">
                        <label for="emailLogin">Correo electrónico</label>
                        <input type="email" id="emailLogin" name="emailLogin" required placeholder="usuario@correo.com">
                    </div>

                    <div class="datos-entrada">
                        <label for="passwordLogin">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="passwordLogin" name="passwordLogin" required placeholder="Contraseña">
                            <button type="button" class="btn-toggle-password" data-target="passwordLogin" aria-label="Mostrar u ocultar contraseña">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="btn boton-enviar">Entrar</button>
                    <p class="form-message" aria-live="polite"></p>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
